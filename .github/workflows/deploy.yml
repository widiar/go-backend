name: Deploy Go Echo to Local Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy with Podman Compose
        run: |
          podman compose -p backend-maw up -d --build
          podman image prune -f